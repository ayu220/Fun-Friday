<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun Friday — Combined Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D0D1A;font-family:'Inter',sans-serif;min-height:100vh;padding:20px}
.wrap{max-width:900px;margin:0 auto}

/* HEADER */
.hdr{background:linear-gradient(135deg,#111827,#1a2744);border-radius:14px;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;border:1px solid rgba(255,255,255,.06)}
.hdr-left .pill{display:inline-block;background:rgba(255,201,64,.12);border:1px solid rgba(255,201,64,.3);border-radius:20px;padding:2px 12px;font-size:9px;font-weight:700;color:#FFC940;letter-spacing:.08em;margin-bottom:6px}
.hdr-left h1{font-size:20px;font-weight:800;color:#fff}
.hdr-left h1 span{color:#FFC940}
.hdr-left p{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}
.refresh-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:rgba(255,255,255,.6);padding:8px 16px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;transition:background .2s}
.refresh-btn:hover{background:rgba(255,255,255,.12)}
.spin.on{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat{background:#161B2E;border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:14px;text-align:center}
.stat .val{font-size:26px;font-weight:800;color:#fff;display:block}
.stat .val.gold{color:#FFC940}
.stat .lbl{font-size:9px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.07em;margin-top:3px;display:block}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:7px 16px;font-size:11px;font-weight:600;color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;font-family:inherit}
.tab:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8)}
.tab.active{background:#FFC940;border-color:#FFC940;color:#111}

/* TABLE */
.tbl-card{background:#161B2E;border:1px solid rgba(255,255,255,.06);border-radius:14px;overflow:hidden}
.tbl-hdr{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.05)}
.tbl-hdr h2{font-size:13px;font-weight:700;color:#fff}
.live{display:flex;align-items:center;gap:5px;font-size:9.5px;color:rgba(255,255,255,.35)}
.dot{width:6px;height:6px;border-radius:50%;background:#10B981;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

table{width:100%;border-collapse:collapse}
thead th{padding:9px 16px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.3);text-align:left;border-bottom:1px solid rgba(255,255,255,.05)}
thead th.c{text-align:center}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,.03)}
tbody tr:last-child{border-bottom:none}
td{padding:10px 16px;vertical-align:middle}
.rank{font-size:11px;font-weight:700;color:rgba(255,255,255,.25);text-align:center;width:40px}
.medal{font-size:18px;text-align:center}
.nm{font-size:13px;font-weight:700;color:#fff;display:block}
.em{font-size:10px;color:rgba(255,255,255,.3);display:block;margin-top:1px}
.week-tag{display:inline-block;font-size:9px;font-weight:600;padding:2px 8px;border-radius:10px;margin-top:3px}
.wt-riddles{background:rgba(99,102,241,.2);color:#A5B4FC}
.wt-logos{background:rgba(255,201,64,.15);color:#FFC940}
.wt-food{background:rgba(16,185,129,.15);color:#34D399}
.time-c{font-size:12px;color:rgba(255,255,255,.4);text-align:center;font-variant-numeric:tabular-nums}
.score-c{text-align:center}
.badge{display:inline-block;font-size:12px;font-weight:700;padding:3px 12px;border-radius:20px}
.s10{background:#FFF3CD;color:#92700A}
.s9{background:#D1FAE5;color:#065F46}
.s8{background:#DBEAFE;color:#1E40AF}
.s7{background:#F3F4F6;color:#4B5563}
.slo{background:#F3F4F6;color:#9CA3AF}
.total-c{text-align:center}
.total{font-size:14px;font-weight:800;color:#FFC940;display:block}
.total-sub{font-size:9px;color:rgba(255,255,255,.25);display:block}

.empty-row td{padding:40px;text-align:center;color:rgba(255,255,255,.3);font-size:13px}
.footer{padding:8px 18px;text-align:right}
.footer span{font-size:8.5px;color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <div class="hdr-left">
      <div class="pill">🎯 ALTUDO FUN FRIDAY — LIVE RESULTS</div>
      <h1>Fun Friday <span>Combined Dashboard</span></h1>
      <p id="hdr-sub">Loading results…</p>
    </div>
    <button class="refresh-btn" onclick="loadAll()">
      <span class="spin" id="spin">↻</span> Refresh
    </button>
  </div>

  <div class="stats">
    <div class="stat"><span class="val" id="s-players">—</span><span class="lbl">Total Players</span></div>
    <div class="stat"><span class="val gold" id="s-top">—</span><span class="lbl">Top Score</span></div>
    <div class="stat"><span class="val" id="s-avg">—</span><span class="lbl">Avg Score</span></div>
    <div class="stat"><span class="val gold" id="s-weeks">—</span><span class="lbl">Quizzes Done</span></div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" onclick="switchTab('all',this)">🏆 All Quizzes</button>
    <button class="tab" onclick="switchTab('Week 2 - Riddles',this)">🧩 Week 2 — Riddles</button>
    <button class="tab" onclick="switchTab('Week 3 - Food',this)">🍕 Week 3 — Food</button>
    <button class="tab" onclick="switchTab('Week 4 - Logos & Brands',this)">🎯 Week 4 — Logos</button>
  </div>

  <div class="tbl-card">
    <div class="tbl-hdr">
      <h2 id="tbl-title">All Quizzes — Combined Leaderboard</h2>
      <div class="live"><span class="dot"></span> auto-updates every 10s</div>
    </div>
    <table>
      <thead>
        <tr>
          <th class="c" style="width:44px">#</th>
          <th>Participant</th>
          <th class="c" style="width:110px">⏱ Time</th>
          <th class="c" style="width:80px">Score</th>
          <th class="c" style="width:80px">Total</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr class="empty-row"><td colspan="5">Loading…</td></tr>
      </tbody>
    </table>
    <div class="footer"><span id="last-upd"></span></div>
  </div>

</div>

<script>
const AIRTABLE_TOKEN = 'patv9xZk9SfFbGY9Y.430aa381141aedc05aedae1f47c37aeaf0a2c27b614bccb74b0789c3024d0030';
const AIRTABLE_BASE  = 'app94kDC0O47m8736';
const AIRTABLE_TABLE = 'Results';

const WEEKS = {
  'Week 2 - Riddles':        {label:'🧩 Riddles',  cls:'wt-riddles'},
  'Week 3 - Food':           {label:'🍕 Food',      cls:'wt-food'},
  'Week 4 - Logos & Brands': {label:'🎯 Logos',     cls:'wt-logos'},
};

let allRecords=[], activeTab='all';

function toSecs(str){
  if(!str) return 99999;
  const m=str.match(/(\d+)m\s*(\d+)s/); if(m) return +m[1]*60+ +m[2];
  const s=str.match(/^(\d+)s$/); if(s) return +s[1];
  return 99999;
}

async function loadAll(){
  const spin=document.getElementById('spin');
  spin.classList.add('on');
  try{
    let records=[], offset='';
    do{
      const url=`https://api.airtable.com/v0/${AIRTABLE_BASE}/${encodeURIComponent(AIRTABLE_TABLE)}?pageSize=100`+(offset?`&offset=${offset}`:'');
      const res=await fetch(url,{headers:{Authorization:'Bearer '+AIRTABLE_TOKEN}});
      const data=await res.json();
      if(!res.ok) throw new Error(data?.error?.message||'API error');
      records=[...records,...(data.records||[])];
      offset=data.offset||'';
    } while(offset);

    allRecords=records.map(r=>({
      name: r.fields.Name||'—',
      email:r.fields.Email||'',
      score:Number(r.fields.Score)||0,
      time: r.fields.Duration||'—',
      week: r.fields.Week||'Unknown',
      secs: toSecs(r.fields.Duration),
    }));

    updateStats();
    renderTable();
    document.getElementById('last-upd').textContent='Updated '+new Date().toLocaleTimeString();
    document.getElementById('hdr-sub').textContent=
      `${allRecords.length} entries · ${new Set(allRecords.map(r=>r.week)).size} quiz weeks`;
  }catch(e){
    document.getElementById('tbody').innerHTML=
      `<tr class="empty-row"><td colspan="5">⚠️ ${e.message}</td></tr>`;
  }
  spin.classList.remove('on');
}

function updateStats(){
  const scores=allRecords.map(r=>r.score);
  document.getElementById('s-players').textContent=new Set(allRecords.map(r=>r.name)).size;
  document.getElementById('s-top').textContent=scores.length?Math.max(...scores)+'/10':'—';
  document.getElementById('s-avg').textContent=scores.length?(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1):'—';
  document.getElementById('s-weeks').textContent=new Set(allRecords.map(r=>r.week)).size;
}

function switchTab(tab, el){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}

function renderTable(){
  const filtered = activeTab==='all' ? allRecords : allRecords.filter(r=>r.week===activeTab);

  if(activeTab==='all'){
    // Combined view: sum scores per person across all weeks
    document.getElementById('tbl-title').textContent='All Quizzes — Combined Leaderboard';
    const map={};
    filtered.forEach(r=>{
      if(!map[r.name]) map[r.name]={name:r.name,email:r.email,total:0,totalSecs:0,weeks:[]};
      map[r.name].total+=r.score;
      map[r.name].totalSecs+=r.secs;
      map[r.name].weeks.push({week:r.week,score:r.score,time:r.time});
    });
    const rows=Object.values(map).sort((a,b)=>b.total-a.total||a.totalSecs-b.totalSecs);
    if(!rows.length){emptyTable();return;}
    document.getElementById('tbody').innerHTML=rows.map((r,i)=>{
      const weekBadges=r.weeks.map(w=>{
        const wk=WEEKS[w.week]||{label:w.week,cls:'wt-riddles'};
        return `<span class="week-tag ${wk.cls}">${wk.label} ${w.score}/10</span>`;
      }).join(' ');
      const rankCell=i===0?'<td class="medal">🥇</td>':i===1?'<td class="medal">🥈</td>':i===2?'<td class="medal">🥉</td>':`<td class="rank">${i+1}</td>`;
      return `<tr>${rankCell}
        <td><span class="nm">${r.name}</span>${r.email?`<span class="em">${r.email}</span>`:''}
        <div style="margin-top:4px">${weekBadges}</div></td>
        <td class="time-c">${fmtSecs(r.totalSecs)}</td>
        <td class="score-c">—</td>
        <td class="total-c"><span class="total">${r.total}</span><span class="total-sub">pts total</span></td>
      </tr>`;
    }).join('');
  } else {
    // Single week view
    const wk=WEEKS[activeTab]||{label:activeTab,cls:''};
    document.getElementById('tbl-title').textContent=`${wk.label} — Individual Results`;
    const rows=[...filtered].sort((a,b)=>b.score-a.score||a.secs-b.secs);
    if(!rows.length){emptyTable();return;}
    document.getElementById('tbody').innerHTML=rows.map((r,i)=>{
      const rankCell=i===0?'<td class="medal">🥇</td>':i===1?'<td class="medal">🥈</td>':i===2?'<td class="medal">🥉</td>':`<td class="rank">${i+1}</td>`;
      const sc=r.score;
      const cls=sc===10?'s10':sc===9?'s9':sc===8?'s8':sc===7?'s7':'slo';
      return `<tr>${rankCell}
        <td><span class="nm">${r.name}</span>${r.email?`<span class="em">${r.email}</span>`:''}</td>
        <td class="time-c">${r.time}</td>
        <td class="score-c"><span class="badge ${cls}">${sc}/10</span></td>
        <td class="total-c"><span class="total" style="font-size:13px">${sc}</span></td>
      </tr>`;
    }).join('');
  }
}

function fmtSecs(s){
  if(s>=99999||!s) return '—';
  const m=Math.floor(s/60),sec=s%60;
  return m?`${m}m ${sec.toString().padStart(2,'0')}s`:`${sec}s`;
}
function emptyTable(){
  document.getElementById('tbody').innerHTML=
    '<tr class="empty-row"><td colspan="5">No results yet for this quiz 🎯</td></tr>';
}

loadAll();
setInterval(loadAll,10000);
</script>
</body>
</html>
