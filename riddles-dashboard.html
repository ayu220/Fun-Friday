<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzles & Riddles — HR Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#F0F4F8;min-height:100vh;color:#1A2B3C}
.header{background:#1A0A3A;color:#fff;padding:1.25rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.header h1{font-size:18px;font-weight:700}
.btn{background:#7C3AED;color:#fff;border:none;border-radius:20px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.85}.btn:disabled{opacity:.5;cursor:default}
.upd{font-size:12px;color:#9A8ABF}
.main{max-width:1050px;margin:0 auto;padding:1.5rem 1rem}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:1.5rem}
.sc{background:#fff;border-radius:12px;padding:1rem 1.25rem;border:1px solid #E2EAF2}
.sv{font-size:28px;font-weight:800;color:#1A0A3A;line-height:1}
.sl{font-size:12px;color:#7A8A9A;margin-top:4px;text-transform:uppercase;letter-spacing:.06em}
.sc.purple .sv{color:#7C3AED}.sc.green .sv{color:#16A34A}
.tw{background:#fff;border-radius:12px;border:1px solid #E2EAF2;overflow:hidden}
.th{padding:1rem 1.25rem;border-bottom:1px solid #E2EAF2;display:flex;align-items:center;justify-content:space-between}
.th h2{font-size:15px;font-weight:700;color:#1A0A3A}
table{width:100%;border-collapse:collapse}
th{background:#F7FAFC;padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:#7A8A9A;text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid #E2EAF2}
td{padding:12px 14px;font-size:14px;border-bottom:1px solid #F0F4F8;color:#1A2B3C}
tr:last-child td{border-bottom:none}
tr:hover td{background:#F7FAFC}
.pill{display:inline-flex;border-radius:20px;padding:3px 10px;font-weight:700;font-size:13px}
.pp{background:#EDE9FE;color:#5B21B6}.pg{background:#DCFCE7;color:#166534}
.pa{background:#FEF9C3;color:#854D0E}.pr{background:#FEE2E2;color:#991B1B}
.msg{text-align:center;padding:3rem;color:#7A8A9A;font-size:14px}
.err{background:#FEE2E2;color:#991B1B;border-radius:8px;padding:1.25rem;margin:1rem;font-size:13px;line-height:1.7}
.cfg{background:#fff;border:2px dashed #E2EAF2;border-radius:12px;padding:2rem;text-align:center;margin-bottom:1.5rem}
.cfg h3{font-size:16px;font-weight:700;margin-bottom:8px}.cfg p{font-size:13px;color:#7A8A9A;line-height:1.8}
code{background:#F0F4F8;padding:2px 7px;border-radius:4px;font-size:12px}
.badge{background:#EDE9FE;color:#5B21B6;border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;margin-left:10px}
</style>
</head>
<body>
<div class="header">
  <h1>🧩 Puzzles &amp; Riddles — HR Dashboard <span class="badge">Week 2</span></h1>
  <div style="display:flex;align-items:center;gap:14px">
    <span class="upd" id="upd"></span>
    <button class="btn" id="rbtn" onclick="load()">↻ Refresh</button>
  </div>
</div>
<div class="main">
  <div class="stats">
    <div class="sc"><div class="sv" id="s1">—</div><div class="sl">Participants</div></div>
    <div class="sc purple"><div class="sv" id="s2">—</div><div class="sl">Top Score</div></div>
    <div class="sc green"><div class="sv" id="s3">—</div><div class="sl">Avg Score</div></div>
    <div class="sc"><div class="sv" id="s4">—</div><div class="sl">Perfect 10s</div></div>
  </div>
  <div class="tw">
    <div class="th"><h2>Leaderboard</h2><span style="font-size:12px;color:#7A8A9A">Sorted by score · auto-updates every 10s</span></div>
    <div id="tbody"><div class="msg">Loading results…</div></div>
  </div>
</div>
<script>
var AT_TOKEN = 'patv9xZk9SfFbGY9Y.c61331d25fffc31dd198507ded1289a98e8ebf4707abc1504de75f1b21694e58';
var AT_BASE  = 'app94kDC0O47m8736';
var AT_TABLE = 'Results';

function load(){
  var btn=document.getElementById('rbtn'),body=document.getElementById('tbody');
  btn.disabled=true;btn.textContent='Loading…';
  if(AT_TOKEN==='YOUR_AIRTABLE_TOKEN'||AT_BASE==='YOUR_BASE_ID'){
    body.innerHTML='<div class="cfg"><h3>Setup needed</h3><p>Open in Notepad → replace <code>YOUR_AIRTABLE_TOKEN</code> and <code>YOUR_BASE_ID</code> with your Airtable values.</p></div>';
    btn.disabled=false;btn.textContent='↻ Refresh';return;
  }
  fetch('https://api.airtable.com/v0/'+AT_BASE+'/'+encodeURIComponent(AT_TABLE)+'?sort%5B0%5D%5Bfield%5D=Score&sort%5B0%5D%5Bdirection%5D=desc&pageSize=100',{
    headers:{'Authorization':'Bearer '+AT_TOKEN}
  }).then(function(r){
    if(!r.ok)return r.json().then(function(e){throw new Error((e.error&&e.error.message)||'HTTP '+r.status);});
    return r.json();
  }).then(function(d){
    render(d.records||[]);
    document.getElementById('upd').textContent='Updated '+new Date().toLocaleTimeString();
  }).catch(function(e){
    body.innerHTML='<div class="err"><strong>Could not load.</strong> '+e.message+'<br><br>Check: token has <code>data.records:read</code> scope · Base ID starts with <code>app</code> · Table named exactly <code>Riddles</code></div>';
  }).finally(function(){btn.disabled=false;btn.textContent='↻ Refresh';});
}

function render(records){
  document.getElementById('s1').textContent=records.length;
  if(records.length){
    var s=records.map(function(r){return Number(r.fields.Score)||0;});
    document.getElementById('s2').textContent=Math.max.apply(null,s)+' / 10';
    document.getElementById('s3').textContent=(s.reduce(function(a,b){return a+b;},0)/s.length).toFixed(1);
    document.getElementById('s4').textContent=s.filter(function(x){return x===10;}).length;
  }
  var body=document.getElementById('tbody');
  if(!records.length){body.innerHTML='<div class="msg">No submissions yet. Share the quiz link with your team!</div>';return;}
  var medals=['🥇','🥈','🥉'];
  var rows=records.map(function(r,i){
    var f=r.fields,score=Number(f.Score)||0;
    var pc=score>=8?'pp':score>=6?'pg':score>=4?'pa':'pr';
    var rank=i<3?medals[i]+' '+(i+1):(i+1);
    var sub=r.createdTime?new Date(r.createdTime).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'—';
    return '<tr><td style="font-weight:700;font-size:13px;color:#7A8A9A">'+rank+'</td>'+
      '<td><strong style="font-weight:600">'+esc(f.Name||'—')+'</strong></td>'+
      '<td style="color:#5A6A7A;font-size:13px">'+esc(f.Email||'—')+'</td>'+
      '<td><span class="pill '+pc+'">'+score+' / 10</span></td>'+
      '<td style="color:#5A6A7A;font-size:13px">'+esc(f.Duration||'—')+'</td>'+
      '<td style="color:#5A6A7A;font-size:13px">'+sub+'</td></tr>';
  }).join('');
  body.innerHTML='<table><thead><tr><th>Rank</th><th>Name</th><th>Email</th><th>Score</th><th>Time Taken</th><th>Submitted At</th></tr></thead><tbody>'+rows+'</tbody></table>';
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
load();setInterval(load,10000);
</script>
</body>
</html>
